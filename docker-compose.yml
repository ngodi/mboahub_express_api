version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: postgres_container
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./src:/app/src # <-- mount host folder to container
      - ./package.json:/app/package.json
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_cache
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '${REDIS_PORT}:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  mboahub-api:
    build: .
    container_name: mboahub_api_container
    env_file:
      - .env
    depends_on:
      'postgres':
        condition: service_healthy
    ports:
      - '5000:5000'

volumes:
  postgres_data:
  redis_data:
